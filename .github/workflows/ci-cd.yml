name: CI/CD NexusPlay

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  build-and-push:
    # Sur self-hosted (pas ubuntu-latest) : evite toute dependance aux minutes
    # Actions hebergees par GitHub (soumises a verification de facturation),
    # et reutilise le Docker Desktop deja present sur ce runner local.
    # Tous les steps sont en PowerShell (shell par defaut sur un runner Windows) :
    # un "shell: bash" avec chemin custom vers Git Bash provoque une erreur .NET
    # ("Second path fragment must not be a drive or UNC name") sur ce runner,
    # et le bash.exe de WSL sans distro installee echoue aussi -> on evite bash.
    runs-on: self-hosted
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          $sha = (git rev-parse --short HEAD)
          "tag=sha-$sha" >> $env:GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push game-service
        uses: docker/build-push-action@v6
        with:
          context: ./services/game-service
          push: true
          tags: |
            yazmhog/nexusplay-game-service:${{ steps.vars.outputs.tag }}
            yazmhog/nexusplay-game-service:latest

      - name: Build & push leaderboard-service
        uses: docker/build-push-action@v6
        with:
          context: ./services/leaderboard-service
          push: true
          tags: |
            yazmhog/nexusplay-leaderboard-service:${{ steps.vars.outputs.tag }}
            yazmhog/nexusplay-leaderboard-service:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./services/frontend
          push: true
          tags: |
            yazmhog/nexusplay-frontend:${{ steps.vars.outputs.tag }}
            yazmhog/nexusplay-frontend:latest

      # A la publication d'un tag semver (vX.Y.Z sur main), on retague en plus
      # les images deja poussees avec ce numero de version (traçabilite du
      # commit exact via le tag "sha-xxxxxxx" reste toujours disponible aussi).
      - name: Tag semver images (releases uniquement)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v',''
          foreach ($svc in @('game-service','leaderboard-service','frontend')) {
            docker buildx imagetools create -t "yazmhog/nexusplay-${svc}:${version}" "yazmhog/nexusplay-${svc}:${{ steps.vars.outputs.tag }}"
          }

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Rolling update des Deployments Kubernetes
        run: |
          $tag = "${{ needs.build-and-push.outputs.tag }}"
          kubectl set image deployment/game-service game-service=yazmhog/nexusplay-game-service:$tag -n nexusplay
          kubectl set image deployment/leaderboard-service leaderboard-service=yazmhog/nexusplay-leaderboard-service:$tag -n nexusplay
          kubectl set image deployment/frontend frontend=yazmhog/nexusplay-frontend:$tag -n nexusplay
          kubectl rollout status deployment/game-service -n nexusplay --timeout=120s
          kubectl rollout status deployment/leaderboard-service -n nexusplay --timeout=120s
          kubectl rollout status deployment/frontend -n nexusplay --timeout=120s

  load-test:
    needs: deploy
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Test de charge k6 (smoke, gate de la pipeline)
        run: |
          docker run --rm --add-host=host.docker.internal:host-gateway -v "${{ github.workspace }}/loadtest/k6:/scripts" grafana/k6 run /scripts/ci-smoke.js

  notify-failure:
    needs: [build-and-push, deploy, load-test]
    if: failure()
    runs-on: self-hosted
    steps:
      - name: Notifier Slack de l'echec
        run: |
          $body = @{ text = ":x: NexusPlay CI/CD : echec du pipeline sur ``${{ github.ref_name }}`` (${{ github.sha }}). Details : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" } | ConvertTo-Json
          Invoke-RestMethod -Uri "${{ secrets.SLACK_WEBHOOK_URL }}" -Method Post -Body $body -ContentType 'application/json'
