# Configuration allegee pour un cluster Kubernetes local mono-noeud (Docker Desktop / kind).
# On desactive les composants de control-plane que kind n'expose pas (sinon les dashboards
# affichent des cibles "down" en permanence, ce qui ressemble a un bug pendant la demo).
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false

prometheus:
  prometheusSpec:
    replicas: 1
    # Autorise Prometheus a decouvrir les ServiceMonitor de n'importe quel namespace,
    # pas seulement ceux avec le label "release" du chart (par defaut).
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

alertmanager:
  alertmanagerSpec:
    replicas: 1
    # Le webhook Slack n'est PAS ici : il vit dans le Secret "alertmanager-slack"
    # (namespace monitoring), cree hors-git avec :
    #   kubectl create secret generic alertmanager-slack -n monitoring \
    #     --from-literal=slack_api_url=<url du webhook Slack>
    # Ce depot est public, on ne commit jamais un webhook/token en clair.
    secrets:
      - alertmanager-slack
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: slack-notifications
      group_by: ["alertname", "namespace"]
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 3h
      routes:
        # Watchdog est une alerte "toujours active" utilisee pour verifier que
        # le pipeline d'alerte fonctionne -> volontairement ignoree (receiver null).
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
    receivers:
      - name: "null"
      - name: slack-notifications
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack/slack_api_url
            channel: "#tous-nessus-play"
            send_resolved: true
            title: "{{ .CommonLabels.alertname }} ({{ .Status }})"
            text: "{{ range .Alerts }}{{ .Annotations.description }}{{ \"\\n\" }}{{ end }}"

grafana:
  enabled: true
  adminPassword: nexusplay-admin
