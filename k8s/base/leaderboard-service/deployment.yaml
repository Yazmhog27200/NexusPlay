apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaderboard-service
  namespace: nexusplay
spec:
  replicas: 3
  selector:
    matchLabels:
      app: leaderboard-service
  template:
    metadata:
      labels:
        app: leaderboard-service
    spec:
      serviceAccountName: leaderboard-service-sa
      volumes:
        - name: vault-secrets
          emptyDir: {}
        - name: vault-init-script
          configMap:
            name: vault-init-script
            defaultMode: 0755
      initContainers:
        # Recupere les identifiants Postgres depuis Vault (auth Kubernetes) et les
        # ecrit dans un fichier .env partage, lu par le conteneur principal au
        # demarrage. Remplace les identifiants en dur/Secret k8s par une source
        # geree par Vault (cf Phase 6 du projet).
        - name: vault-init
          image: hashicorp/vault:1.17
          command: ["sh", "/scripts/vault-init.sh"]
          env:
            - name: VAULT_ROLE
              value: leaderboard-service
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault-secrets
            - name: vault-init-script
              mountPath: /scripts
      containers:
        - name: leaderboard-service
          image: yazmhog/nexusplay-leaderboard-service:1.1.0
          command: ["sh", "-c"]
          args:
            - "set -a; . /vault-secrets/.env; set +a; exec node src/index.js"
          ports:
            - containerPort: 3000
          env:
            - name: REDIS_URL
              value: redis://redis.nexusplay.svc.cluster.local:6379
            - name: PGHOST
              value: postgres.nexusplay.svc.cluster.local
            - name: PGPORT
              value: "5432"
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault-secrets
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
