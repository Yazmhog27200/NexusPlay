apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-sa
  namespace: nexusplay
---
# Vault a besoin d'appeler l'API TokenReview de Kubernetes pour valider les JWT
# presentes par les pods qui se connectent via l'auth method "kubernetes".
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-auth-delegator
subjects:
  - kind: ServiceAccount
    name: vault-sa
    namespace: nexusplay
roleRef:
  kind: ClusterRole
  name: system:auth-delegator
  apiGroup: rbac.authorization.k8s.io
